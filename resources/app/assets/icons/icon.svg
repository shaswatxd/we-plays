<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DB2777;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)"/>
  
  <!-- Inner glow circle -->
  <circle cx="256" cy="256" r="180" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Main Music Note -->
  <g filter="url(#glow)">
    <!-- Note stem and flag -->
    <rect x="295" y="140" width="18" height="150" rx="9" fill="white" opacity="0.95"/>
    <path d="M313 140 Q340 135 340 160 Q340 180 320 185 L313 175 Z" fill="white" opacity="0.95"/>
    
    <!-- Note head (bottom) -->
    <ellipse cx="304" cy="290" rx="32" ry="24" fill="white" opacity="0.95"/>
    
    <!-- Second note stem -->
    <rect x="190" y="180" width="16" height="140" rx="8" fill="white" opacity="0.9"/>
    
    <!-- Second note head -->
    <ellipse cx="198" cy="320" rx="28" ry="22" fill="white" opacity="0.9"/>
    
    <!-- Connecting beam -->
    <path d="M313 160 L206 195 L206 180 L313 145 Z" fill="white" opacity="0.92"/>
  </g>
  
  <!-- Play Button Circle -->
  <circle cx="370" cy="380" r="58" fill="url(#playGradient)" filter="url(#glow)"/>
  <path d="M358 365 L358 395 L388 380 Z" fill="white" opacity="0.98"/>
  
  <!-- Decorative sound waves -->
  <path d="M140 230 Q145 240 140 250" stroke="rgba(255,255,255,0.25)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M120 220 Q127 240 120 260" stroke="rgba(255,255,255,0.2)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M385 140 Q390 150 385 160" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
